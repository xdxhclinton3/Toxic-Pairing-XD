<!DOCTYPE html>
  <html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Toxic-MD | Session Generator</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
      :root {
        --primary: #6366f1;
        --primary-dim: rgba(99,102,241,0.15);
        --accent: #a855f7;
        --success: #10b981;
        --bg: #050810;
        --surface: #0d1117;
        --surface2: #161b27;
        --border: rgba(99,102,241,0.2);
        --border-dim: rgba(255,255,255,0.06);
        --text: #e2e8f0;
        --text-muted: #64748b;
        --glow: rgba(99,102,241,0.35);
      }
      *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
      html { scroll-behavior:smooth; }
      body {
        background: var(--bg);
        color: var(--text);
        font-family: 'Inter', sans-serif;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        overflow-x: hidden;
        padding: 20px 16px 40px;
      }
      body::before {
        content:'';
        position:fixed; inset:0;
        background-image:
          linear-gradient(rgba(99,102,241,0.04) 1px, transparent 1px),
          linear-gradient(90deg, rgba(99,102,241,0.04) 1px, transparent 1px);
        background-size:40px 40px;
        z-index:0; pointer-events:none;
      }
      body::after {
        content:'';
        position:fixed;
        top:-200px; left:50%;
        transform:translateX(-50%);
        width:700px; height:500px;
        background:radial-gradient(ellipse, rgba(99,102,241,0.12) 0%, transparent 70%);
        z-index:0; pointer-events:none;
      }
      .wrapper {
        position:relative; z-index:1;
        width:100%; max-width:420px;
        display:flex; flex-direction:column; gap:16px;
        animation: fadeUp 0.6s cubic-bezier(0.16,1,0.3,1) both;
      }
      @keyframes fadeUp { from { opacity:0; transform:translateY(24px); } to { opacity:1; transform:translateY(0); } }
      .header-badge {
        display:flex; align-items:center; justify-content:center; gap:8px; margin-bottom:4px;
      }
      .badge-dot {
        width:8px; height:8px;
        background:var(--success); border-radius:50%;
        box-shadow:0 0 8px var(--success);
        animation:pulse 2s ease-in-out infinite;
      }
      @keyframes pulse { 0%,100%{opacity:1;box-shadow:0 0 8px var(--success);} 50%{opacity:0.5;box-shadow:0 0 16px var(--success);} }
      .badge-text { font-size:11px; font-weight:700; color:var(--success); letter-spacing:2px; text-transform:uppercase; }
      .card {
        background:var(--surface);
        border:1px solid var(--border-dim);
        border-radius:24px;
        padding:36px 28px 32px;
        position:relative; overflow:hidden;
      }
      .card::before {
        content:'';
        position:absolute; top:0; left:0; right:0; height:1px;
        background:linear-gradient(90deg, transparent, var(--primary), var(--accent), transparent);
        opacity:0.6;
      }
      .brand {
        display:flex; flex-direction:column; align-items:center;
        text-align:center; margin-bottom:32px;
      }
      .logo-ring {
        position:relative; width:72px; height:72px; margin-bottom:18px;
      }
      .logo-ring svg { position:absolute; inset:0; animation:spin 8s linear infinite; }
      @keyframes spin { to { transform:rotate(360deg); } }
      .logo-icon {
        position:absolute; inset:10px;
        background:linear-gradient(135deg, var(--primary), var(--accent));
        border-radius:14px;
        display:flex; align-items:center; justify-content:center;
        font-size:24px; color:white;
        box-shadow:0 0 24px var(--glow);
      }
      .brand h1 {
        font-size:22px; font-weight:900; letter-spacing:-0.5px;
        background:linear-gradient(135deg, #fff 30%, var(--accent));
        -webkit-background-clip:text; -webkit-text-fill-color:transparent;
      }
      .brand p { font-size:12px; color:var(--text-muted); margin-top:5px; letter-spacing:1px; text-transform:uppercase; }
      .divider { height:1px; background:var(--border-dim); margin-bottom:24px; }
      .choice-label {
        font-size:11px; font-weight:700; color:var(--text-muted);
        letter-spacing:1.5px; text-transform:uppercase;
        margin-bottom:16px; text-align:center; display:block;
      }
      .btn-group { display:flex; flex-direction:column; gap:12px; }
      .btn-choice {
        width:100%; height:56px;
        border:1px solid var(--border-dim);
        border-radius:14px;
        background:var(--surface2);
        color:var(--text);
        font-size:14px; font-weight:700;
        font-family:'Inter', sans-serif;
        letter-spacing:0.5px;
        cursor:pointer;
        display:flex; align-items:center; justify-content:center; gap:12px;
        position:relative; overflow:hidden;
        transition:border-color 0.2s, background 0.2s, transform 0.2s, box-shadow 0.2s;
      }
      .btn-choice.primary {
        background:linear-gradient(135deg, var(--primary), var(--accent));
        border-color:transparent;
        color:white;
        box-shadow:0 4px 20px var(--glow);
      }
      .btn-choice.primary:hover { transform:translateY(-2px); box-shadow:0 8px 28px var(--glow); }
      .btn-choice:not(.primary):hover {
        border-color:var(--border); background:rgba(255,255,255,0.04);
        transform:translateY(-1px);
      }
      .btn-choice:active { transform:translateY(0) !important; }
      .btn-shimmer {
        position:absolute; inset:0;
        background:linear-gradient(90deg, transparent 0%, rgba(255,255,255,0.12) 50%, transparent 100%);
        transform:translateX(-100%);
      }
      .btn-choice.primary:hover .btn-shimmer { animation:shimmer 1.2s ease forwards; }
      @keyframes shimmer { to { transform:translateX(100%); } }
      .footer-note {
        text-align:center; font-size:11px; color:var(--text-muted);
        padding:0 8px; line-height:1.6;
      }
      .footer-note a { color:var(--primary); text-decoration:none; }
      .footer-note a:hover { text-decoration:underline; }
      @media (max-width:380px) {
        .card { padding:28px 18px 24px; }
        .brand h1 { font-size:20px; }
      }
    </style>
  </head>
  <body>
    <div class="wrapper">
      <div class="header-badge">
        <div class="badge-dot"></div>
        <span class="badge-text">Service Online</span>
      </div>
      <div class="card">
        <div class="brand">
          <div class="logo-ring">
            <svg viewBox="0 0 72 72" fill="none" xmlns="http://www.w3.org/2000/svg">
              <circle cx="36" cy="36" r="33" stroke="url(#gr1)" stroke-width="1.5" stroke-dasharray="6 4"/>
              <defs>
                <linearGradient id="gr1" x1="0" y1="0" x2="72" y2="72" gradientUnits="userSpaceOnUse">
                  <stop stop-color="#6366f1"/>
                  <stop offset="1" stop-color="#a855f7"/>
                </linearGradient>
              </defs>
            </svg>
            <div class="logo-icon"><i class="fas fa-robot"></i></div>
          </div>
          <h1>Toxic-MD</h1>
          <p>Session Generator</p>
        </div>
        <div class="divider"></div>
        <span class="choice-label">Choose connection method</span>
        <div class="btn-group">
          <button class="btn-choice primary" onclick="window.location.href='/qr'">
            <div class="btn-shimmer"></div>
            <i class="fas fa-qrcode"></i>
            <span>QR Code</span>
          </button>
          <button class="btn-choice" onclick="window.location.href='/pair'">
            <i class="fas fa-mobile-alt"></i>
            <span>Pairing Code</span>
          </button>
        </div>
      </div>
      <p class="footer-note">
        Powered by <a href="https://github.com/xhclintohn/Toxic-MD" target="_blank">Toxic-MD</a> &middot;
        <a href="https://wa.me/254114885159" target="_blank">Support</a>
      </p>
    </div>
  </body>
  </html>
